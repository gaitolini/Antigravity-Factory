name: Validação de Scripts

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-bash:
    name: Lint Bash Script (ShellCheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'init_antigravity.sh'

  validate-powershell:
    name: Lint PowerShell Script (PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path .\init_antigravity.ps1 -Severity Warning, Error
          if ($results) {
              $results | Format-Table
              throw "Falha na análise estática do script PowerShell. Resolva os alertas acima."
          } else {
              Write-Output "✅ Script PowerShell está em conformidade com as boas práticas."
          }
